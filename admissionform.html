<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Admission Form</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f4f7;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .form-container {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select, textarea {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row .form-group {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1e40af;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h1>🎓 Student Admission Form</h1>

    <form>
      <div class="row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" placeholder="Enter first name" required>
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" placeholder="Enter last name" required>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter email" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number" required>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" required>
        </div>

        <div class="form-group">
          <label>Gender</label>
          <select required>
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Course</label>
        <select required>
          <option value="">Select Course</option>
          <option>BTech Computer Science</option>
          <option>BCA</option>
          <option>BBA</option>
          <option>BSc</option>
        </select>
      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea placeholder="Enter your address"></textarea>
      </div>

      <button type="submit">Submit Application</button>
    </form>
  </div>

</body>
</html>
